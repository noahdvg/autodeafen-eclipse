name: Build AutoDeafen Eclipse

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Windows Geode mod
        uses: geode-sdk/build-geode-mod@main
        with:
          target: Win64
      - name: Upload compiled mod
        uses: actions/upload-artifact@v4
        with:
          name: autodeafen-eclipse
          path: build/*.geode
